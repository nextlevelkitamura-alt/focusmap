name: Deploy to Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PROJECT_ID: shikumika-app
  SERVICE_NAME: shikumika-app
  REGION: asia-northeast1
  PUBLIC_URL: https://focusmap-official.com
  IMAGE_NAME: asia-northeast1-docker.pkg.dev/shikumika-app/cloud-run-source-deploy/shikumika-app

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker to use gcloud as a credential helper
        run: gcloud auth configure-docker asia-northeast1-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          docker buildx build --push --platform linux/amd64 \
            -t ${IMAGE_NAME}:${{ github.sha }} \
            -t ${IMAGE_NAME}:latest \
            --build-arg NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }} \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }} \
            --build-arg NEXT_PUBLIC_SITE_URL=${PUBLIC_URL} \
            .

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${SERVICE_NAME} \
            --image ${IMAGE_NAME}:${{ github.sha }} \
            --platform managed \
            --region ${REGION} \
            --allow-unauthenticated \
            --memory 512Mi \
            --cpu 1 \
            --cpu-throttling \
            --no-cpu-boost \
            --min-instances 0 \
            --max-instances 3 \
            --concurrency 20 \
            --timeout 300s \
            --port 3000 \
            --set-env-vars NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }} \
            --set-env-vars NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }} \
            --set-env-vars NEXT_PUBLIC_SITE_URL=${PUBLIC_URL} \
            --set-env-vars GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }} \
            --set-env-vars GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }} \
            --set-env-vars NEXTAUTH_URL=${PUBLIC_URL} \
            --set-env-vars NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }} \
            --set-env-vars GOOGLE_GENERATIVE_AI_API_KEY=${{ secrets.GEMINI_API_KEY }} \
            --set-env-vars GROQ_API_KEY=${{ secrets.GROQ_API_KEY }} \
            --set-env-vars OPENCODE_GO_API_KEY=${{ secrets.OPENCODE_GO_API_KEY }} \
            --set-env-vars EXTERNAL_AI_API_KEY=${{ secrets.OPENCODE_GO_API_KEY }} \
            --set-env-vars EXTERNAL_AI_API_BASE_URL=https://opencode.ai/zen/go/v1/chat/completions \
            --set-env-vars EXTERNAL_AI_MODEL=kimi-k2.6 \
            --set-env-vars EXTERNAL_AI_DISABLE_THINKING=false \
            --set-env-vars GOOGLE_REDIRECT_URI=${PUBLIC_URL}/api/calendar/callback

      - name: Show service URL
        run: |
          echo "✅ Deployed to: $(gcloud run services describe ${SERVICE_NAME} --region ${REGION} --format 'value(status.url)')"
