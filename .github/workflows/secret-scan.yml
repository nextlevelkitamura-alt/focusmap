name: Secret Scan

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check tracked files for blocked secret patterns
        run: node scripts/check-no-secrets.mjs
