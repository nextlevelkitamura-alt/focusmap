appId: com.focusmap.desktop
productName: Focusmap
extraMetadata:
  main: main.cjs
directories:
  app: desktop/focusmap-mac
  output: dist-desktop
npmRebuild: false
files:
  - '**/*'
  - '!node_modules/**'
  - '!**/node_modules/**'
extraResources:
  - from: .next/standalone
    to: next-standalone
    filter:
      - '**/*'
  - from: .next/standalone/node_modules
    to: next-standalone/node_modules
    filter:
      - '**/*'
  - from: .next/static
    to: next-standalone/.next/static
    filter:
      - '**/*'
  - from: public
    to: next-standalone/public
    filter:
      - '**/*'
  - from: scripts/focusmap-agent
    to: focusmap-agent
    filter:
      - dist/**
      - package.json
      - package-lock.json
  - from: scripts/focusmap-agent/node_modules
    to: focusmap-agent/node_modules
    filter:
      - '**/*'
  - from: scripts/run-codex-app-server.sh
    to: run-codex-app-server.sh
mac:
  icon: desktop/focusmap-mac/assets/icon.icns
  category: public.app-category.productivity
  target:
    - target: dir
      arch:
        - arm64
    - target: dmg
      arch:
        - arm64
  hardenedRuntime: false
  gatekeeperAssess: false
  identity: null
