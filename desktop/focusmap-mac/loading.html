<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Focusmap 起動中</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #070707;
        --text: #f4f4f5;
        --muted: #9ca3af;
        --line: #282828;
        --panel: #111;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: linear-gradient(180deg, #09090b 0%, #050507 100%);
        color: var(--text);
        font: 13px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      .panel {
        width: min(480px, 90vw);
        border: 1px solid var(--line);
        border-radius: 12px;
        background: #08080c;
        padding: 22px;
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.5);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 18px;
        font-weight: 650;
      }

      .muted {
        color: var(--muted);
      }

      .row {
        display: flex;
        gap: 12px;
        align-items: center;
        margin-top: 14px;
      }

      .spinner {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        border: 2px solid #2c2c2d;
        border-top-color: #d4d4d8;
        animation: spin 0.8s linear infinite;
      }

      .error {
        margin-top: 14px;
        padding: 12px;
        border: 1px solid #4f2c2a;
        border-radius: 8px;
        background: #201212;
        color: #fda4af;
        white-space: pre-wrap;
        word-break: break-word;
        max-height: 110px;
        overflow: auto;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <h1>Focusmap を起動しています</h1>
      <div class="muted">しばらくしてメイン画面が開きます。3〜5秒程度です。</div>
      <div class="row">
        <div class="spinner" aria-hidden="true"></div>
        <span id="message" class="muted">Next.js を起動中です</span>
      </div>
      <div id="error" class="error" style="display:none;"></div>
    </div>
    <script>
      const params = new URLSearchParams(location.search);
      const message = document.getElementById('message');
      const error = document.getElementById('error');
      const errorMessage = params.get('error');
      if (errorMessage) {
        message.textContent = '起動に失敗しました。Focusmapを開き直してください。';
        error.textContent = errorMessage;
        error.style.display = 'block';
      }
    </script>
  </body>
</html>
